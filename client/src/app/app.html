<router-outlet></router-outlet>

<!-- Toast System Container -->
<div class="fixed top-5 right-5 z-[9999] flex flex-col gap-3 max-w-sm w-full pointer-events-none">
  @for (toast of toasts$ | async; track toast.id) {
    <div class="pointer-events-auto flex items-start gap-3 p-4 rounded-xl shadow-2xl border backdrop-blur-md transition-all duration-300 transform translate-y-0"
         [ngClass]="{
           'bg-emerald-500/10 border-emerald-500/20 text-emerald-600 dark:text-emerald-400': toast.type === 'success',
           'bg-rose-500/10 border-rose-500/20 text-rose-600 dark:text-rose-400': toast.type === 'danger',
           'bg-amber-500/10 border-amber-500/20 text-amber-600 dark:text-amber-400': toast.type === 'warning',
           'bg-sky-500/10 border-sky-500/20 text-sky-600 dark:text-sky-400': toast.type === 'info'
         }">
      <!-- Icon -->
      <div class="mt-0.5">
        @if (toast.type === 'success') {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        } @else if (toast.type === 'danger') {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        } @else if (toast.type === 'warning') {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        } @else {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        }
      </div>

      <!-- Content -->
      <div class="flex-1">
        <h4 class="text-sm font-semibold">{{ toast.title }}</h4>
        <p class="text-xs opacity-90 mt-0.5">{{ toast.message }}</p>
      </div>

      <!-- Close Button -->
      <button (click)="removeToast(toast.id)" class="text-current opacity-60 hover:opacity-100 transition-opacity">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
  }
</div>
